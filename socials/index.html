<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyeMoz — Socials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e8002a;
    --red-glow: #ff0033;
    --red-dim: #8b0015;
    --navy: #040d1a;
    --navy2: #061225;
    --panel: rgba(10,20,40,0.82);
    --border: rgba(232,0,42,0.35);
    --text: #e8eaf6;
    --text-dim: #7a8aaa;
    --mono: 'Share Tech Mono', monospace;
    --title: 'Orbitron', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }
  html, body { min-height: 100vh; width: 100%; background: var(--navy); font-family: var(--body); color: var(--text); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy2); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 3px; }

  #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .scanlines { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px); opacity: 0.4; }
  .mouse-glow { position: fixed; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle,rgba(232,0,42,0.07) 0%,transparent 70%); transform: translate(-50%,-50%); pointer-events: none; z-index: 2; }

  #app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }

  .card {
    width: 100%; max-width: 480px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 0 60px rgba(232,0,42,0.12), 0 0 120px rgba(232,0,42,0.05), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    position: relative;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(32px) scale(0.96)} to{opacity:1;transform:none} }

  /* corner accents */
  .card::before,.card::after { content:''; position:absolute; width:18px; height:18px; border-color:var(--red); border-style:solid; z-index:5; }
  .card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
  .card::after  { top:10px; right:10px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
  .corner-bl,.corner-br { position:absolute; width:18px; height:18px; z-index:5; border-color:var(--red); border-style:solid; }
  .corner-bl { bottom:10px; left:10px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
  .corner-br { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

  /* HEADER */
  .card-header {
    padding: 36px 32px 28px;
    text-align: center;
    border-bottom: 1px solid rgba(232,0,42,0.15);
    background: rgba(0,0,0,0.15);
    position: relative;
  }
  .header-badge {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--title); font-size: 9px; letter-spacing: 3px;
    color: var(--red); margin-bottom: 14px;
    padding: 5px 14px; border: 1px solid rgba(232,0,42,0.3);
    border-radius: 20px; background: rgba(232,0,42,0.06);
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 6px var(--red)} 50%{box-shadow:0 0 14px var(--red-glow),0 0 24px rgba(232,0,42,0.4)} }

  .header-title {
    font-family: var(--title);
    font-size: 28px; font-weight: 900;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }
  .header-title span { color: var(--red); }
  .header-sub {
    font-family: var(--mono);
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* SOCIALS LIST */
  .socials-list {
    padding: 24px 24px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .social-card {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 18px;
    background: rgba(0,0,0,0.3);
    border: 1.5px solid rgba(232,0,42,0.15);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s, background 0.25s;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }
  .social-card:nth-child(1) { animation-delay: 0.1s; }
  .social-card:nth-child(2) { animation-delay: 0.18s; }
  .social-card:nth-child(3) { animation-delay: 0.26s; }
  @keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

  .social-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent, var(--red));
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 14px 0 0 14px;
  }
  .social-card:hover { transform: translateX(4px); }
  .social-card:hover::before { opacity: 1; }

  /* per-platform colors */
  .social-card.discord  { --accent: #5865f2; }
  .social-card.youtube  { --accent: #ff0000; }
  .social-card.tiktok   { --accent: #00f2ea; }

  .social-card.discord:hover  { border-color: rgba(88,101,242,0.5); box-shadow: 0 0 20px rgba(88,101,242,0.12); background: rgba(88,101,242,0.06); }
  .social-card.youtube:hover  { border-color: rgba(255,0,0,0.5);     box-shadow: 0 0 20px rgba(255,0,0,0.12);     background: rgba(255,0,0,0.06); }
  .social-card.tiktok:hover   { border-color: rgba(0,242,234,0.5);   box-shadow: 0 0 20px rgba(0,242,234,0.12);   background: rgba(0,242,234,0.06); }

  .social-card.disabled { pointer-events: none; opacity: 0.5; filter: grayscale(0.4); }

  .icon-wrap {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }
  .social-card.discord:hover  .icon-wrap { background: rgba(88,101,242,0.15);  border-color: rgba(88,101,242,0.3); }
  .social-card.youtube:hover  .icon-wrap { background: rgba(255,0,0,0.15);     border-color: rgba(255,0,0,0.3); }
  .social-card.tiktok:hover   .icon-wrap { background: rgba(0,242,234,0.15);   border-color: rgba(0,242,234,0.3); }

  .icon-wrap svg { width: 22px; height: 22px; }

  .social-info { flex: 1; min-width: 0; }
  .social-name {
    font-family: var(--title); font-size: 13px; letter-spacing: 2px;
    font-weight: 700; color: var(--text); margin-bottom: 3px;
  }
  .social-handle {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .social-card.coming-soon .social-handle { color: rgba(232,0,42,0.6); }

  .social-arrow {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .social-card:hover .social-arrow { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
  .social-arrow svg { width: 13px; height: 13px; color: var(--text-dim); transition: color 0.2s, transform 0.2s; }
  .social-card:hover .social-arrow svg { color: var(--text); transform: translate(2px,-2px); }

  .coming-badge {
    font-family: var(--title); font-size: 8px; letter-spacing: 1.5px;
    color: var(--red); background: rgba(232,0,42,0.1);
    border: 1px solid rgba(232,0,42,0.3);
    border-radius: 6px; padding: 4px 8px;
    flex-shrink: 0;
  }

  /* DIVIDER */
  .divider {
    margin: 4px 24px;
    height: 1px;
    background: linear-gradient(90deg,transparent,rgba(232,0,42,0.2),transparent);
  }

  /* RETURN */
  .return-wrap {
    padding: 16px 24px 28px;
  }
  .return-btn {
    width: 100%; padding: 13px;
    background: rgba(0,0,0,0.25);
    border: 1.5px solid rgba(232,0,42,0.2);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: var(--title); font-size: 11px; letter-spacing: 2px;
    cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.25s;
    animation: slideUp 0.6s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  .return-btn:hover {
    border-color: rgba(232,0,42,0.5);
    color: var(--text);
    background: rgba(232,0,42,0.07);
    box-shadow: 0 0 18px rgba(232,0,42,0.1);
  }
  .return-btn svg { width: 15px; height: 15px; transition: transform 0.2s; }
  .return-btn:hover svg { transform: translateX(-3px); }

  /* FOOTER */
  .card-footer {
    padding: 0 24px 20px;
    display: flex; justify-content: center;
    gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot.active { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .dot.inactive { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="mouse-glow" id="mouse-glow"></div>

<div id="app">
  <div class="card">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <!-- Header -->
    <div class="card-header">
      <div class="header-badge">
        <div class="badge-dot"></div>
        MOZSTUDIO
      </div>
      <div class="header-title">SKYE<span>MOZ</span></div>
      <div class="header-sub">SOCIALS</div>
    </div>

    <!-- Socials -->
    <div class="socials-list">

      <!-- Discord -->
      <div class="social-card discord coming-soon disabled">
        <div class="icon-wrap">
          <!-- Discord icon -->
          <svg viewBox="0 0 24 24" fill="#5865f2" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
        </div>
        <div class="social-info">
          <div class="social-name">DISCORD</div>
          <div class="social-handle">Coming soon...</div>
        </div>
        <div class="coming-badge">SOON</div>
      </div>

      <!-- YouTube -->
      <a class="social-card youtube" href="https://youtube.com/@SkyeMozOfficial" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <!-- YouTube icon -->
          <svg viewBox="0 0 24 24" fill="#ff0000" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </div>
        <div class="social-info">
          <div class="social-name">YOUTUBE</div>
          <div class="social-handle">@SkyeMozOfficial</div>
        </div>
        <div class="social-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        </div>
      </a>

      <!-- TikTok -->
      <a class="social-card tiktok" href="https://tiktok.com/@SkyeMozMC" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <!-- TikTok icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#00f2ea" d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.28 6.28 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
          </svg>
        </div>
        <div class="social-info">
          <div class="social-name">TIKTOK</div>
          <div class="social-handle">@SkyeMozMC</div>
        </div>
        <div class="social-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        </div>
      </a>

    </div>

    <div class="divider"></div>

    <!-- Return -->
    <div class="return-wrap">
      <a class="return-btn" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        RETURN TO MAIN PAGE
      </a>
    </div>

    <div class="card-footer">
      <div class="dot active"></div>
      <div class="dot inactive"></div>
      <div class="dot inactive"></div>
    </div>

  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars=[], particles=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<160;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.3,a:Math.random(),tw:Math.random()*Math.PI*2,sp:Math.random()*0.0003+0.0001});
  for(let i=0;i<35;i++) particles.push({x:Math.random()*9999,y:Math.random()*9999,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*2+0.5,a:Math.random()*0.5+0.1,c:Math.random()>0.6?'#e8002a':'#1a3060'});
  function draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
    g.addColorStop(0,'#061225');g.addColorStop(0.5,'#030d1a');g.addColorStop(1,'#020810');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const gl=ctx.createRadialGradient(W/2,H,0,W/2,H,W*0.6);
    gl.addColorStop(0,'rgba(232,0,42,0.06)');gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.tw+=s.sp*60;const a=s.a*(0.5+0.5*Math.sin(s.tw));ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${a})`;ctx.fill();});
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+Math.floor(p.a*255).toString(16).padStart(2,'0');ctx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
  const glow=document.getElementById('mouse-glow');
  document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
})();
</script>
</body>
</html>
