<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — MozStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e8002a;
    --red-glow: #ff0033;
    --red-dim: #8b0015;
    --navy: #040d1a;
    --navy2: #061225;
    --panel: rgba(10,20,40,0.82);
    --panel2: rgba(6,12,28,0.90);
    --border: rgba(232,0,42,0.35);
    --border-bright: rgba(232,0,42,0.75);
    --text: #e8eaf6;
    --text-dim: #7a8aaa;
    --green: #00e676;
    --green-dim: #00b050;
    --mono: 'Share Tech Mono', monospace;
    --title: 'Orbitron', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }
  html, body {
    min-height: 100vh; width: 100%;
    background: var(--navy);
    font-family: var(--body);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--navy2); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 3px; }

  /* ===== BACKGROUND ===== */
  #bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    opacity: 0.4;
  }
  .mouse-glow {
    position: fixed; width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,0,42,0.08) 0%, transparent 70%);
    transform: translate(-50%,-50%);
    pointer-events: none;
    z-index: 2;
    transition: opacity 0.3s;
  }

  /* ===== PAGE WRAPPER ===== */
  #app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
  }

  /* ===== CARD ===== */
  .card {
    width: 100%; max-width: 780px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow:
      0 0 60px rgba(232,0,42,0.12),
      0 0 120px rgba(232,0,42,0.05),
      inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    position: relative;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--red);
    border-style: solid;
    z-index: 5;
  }
  .card::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .card::after  { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .card-corner-bl, .card-corner-br {
    position: absolute; width: 18px; height: 18px; z-index: 5;
    border-color: var(--red); border-style: solid;
  }
  .card-corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .card-corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* ===== CARD HEADER ===== */
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .red-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red-glow);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 8px var(--red-glow); }
    50%      { box-shadow: 0 0 18px var(--red-glow), 0 0 30px rgba(232,0,42,0.4); }
  }
  .header-title {
    font-family: var(--title);
    font-size: 13px; letter-spacing: 3px;
    color: var(--text); font-weight: 700;
  }
  .among-icon {
    width: 36px; height: 36px; opacity: 0.7;
  }

  /* ===== CARD BODY ===== */
  .card-body {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    padding: 28px;
  }
  @media (max-width: 640px) {
    .card-body { grid-template-columns: 1fr; padding: 20px; }
  }

  /* ===== AVATAR SECTION ===== */
  .avatar-section {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding-right: 28px;
  }
  @media (max-width: 640px) {
    .avatar-section { padding-right: 0; padding-bottom: 20px; }
  }
  .avatar-ring-outer {
    position: relative; width: 200px; height: 200px;
    flex-shrink: 0;
  }
  .avatar-ring-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    animation: spinRing 8s linear infinite;
  }
  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .avatar-ring-svg2 {
    position: absolute; inset: 0; width: 100%; height: 100%;
    animation: spinRing 12s linear infinite reverse;
    opacity: 0.5;
  }
  .avatar-glow {
    position: absolute; inset: 10px;
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(232,0,42,0.5), 0 0 60px rgba(232,0,42,0.2);
    animation: breatheGlow 3s ease-in-out infinite;
    background: radial-gradient(circle, rgba(232,0,42,0.15) 0%, transparent 70%);
  }
  @keyframes breatheGlow {
    0%,100% { box-shadow: 0 0 30px rgba(232,0,42,0.5), 0 0 60px rgba(232,0,42,0.2); }
    50%      { box-shadow: 0 0 50px rgba(232,0,42,0.8), 0 0 90px rgba(232,0,42,0.35); }
  }
  .avatar-img-wrap {
    position: absolute; inset: 18px;
    border-radius: 50%;
    overflow: hidden;
    background: radial-gradient(circle at 30% 30%, #1a0510, #08020e);
    border: 2px solid rgba(232,0,42,0.4);
  }
  .avatar-img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 50%;
  }
  .avatar-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; opacity: 0.5;
  }

  /* ===== INFO SECTION ===== */
  .info-section {
    display: flex; flex-direction: column; gap: 10px;
  }
  .info-box {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(232,0,42,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .info-box:hover {
    border-color: rgba(232,0,42,0.5);
    box-shadow: 0 0 15px rgba(232,0,42,0.1);
  }
  .info-label {
    font-family: var(--title); font-size: 10px; letter-spacing: 2px;
    color: var(--red); margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .info-label svg { width: 13px; height: 13px; }
  .info-value {
    font-family: var(--body); font-size: 26px; font-weight: 700;
    color: var(--text); line-height: 1.1;
  }
  .info-value.mono { font-family: var(--mono); font-size: 17px; }

  .friendcode-row { display: flex; align-items: center; gap: 8px; }
  .friendcode-row .info-value { flex: 1; }
  .copy-btn {
    background: linear-gradient(135deg, #c0001f, #8b0015);
    border: 1px solid var(--red);
    color: #fff; font-family: var(--title);
    font-size: 10px; letter-spacing: 2px;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .copy-btn:hover {
    background: linear-gradient(135deg, #e8002a, #c0001f);
    box-shadow: 0 0 15px rgba(232,0,42,0.5);
    transform: scale(1.05);
  }
  .copy-btn.copied { background: linear-gradient(135deg, #00b050, #008040); border-color: var(--green); }

  /* Status + Lobby row */
  .status-lobby-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    margin-right: 4px;
  }
  .status-dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s infinite; }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .status-text { display: flex; align-items: center; font-size: 17px; font-weight: 700; gap: 6px; }
  .status-text.online  { color: var(--green); }
  .status-text.offline { color: var(--red); }

  /* ===== DESCRIPTION BOX ===== */
  .desc-box {
    margin: 0 28px 20px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(232,0,42,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    position: relative; overflow: hidden;
    transition: border-color 0.3s;
    min-height: 110px;
  }
  .desc-box:hover { border-color: rgba(232,0,42,0.45); }
  .desc-watermark {
    position: absolute; right: 16px; bottom: 10px;
    opacity: 0.06; font-size: 80px; line-height: 1;
    pointer-events: none; user-select: none;
  }
  .desc-label {
    font-family: var(--title); font-size: 10px; letter-spacing: 2px;
    color: var(--red); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .desc-text {
    font-family: var(--mono); font-size: 14px; line-height: 1.9;
    color: #c8d0e8; white-space: pre-wrap;
    min-height: 50px;
  }
  /* Typing cursor */
  .typing-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--red); animation: blink 1s step-end infinite;
    vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ===== FOOTER DOTS ===== */
  .card-footer {
    padding: 14px 28px 20px;
    display: flex; justify-content: center;
    gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; cursor: pointer; transition: all 0.3s; }
  .dot.inactive { background: rgba(255,255,255,0.2); }
  .dot.active { background: var(--red); box-shadow: 0 0 8px var(--red-glow); transform: scale(1.3); }
  .dot:hover { background: var(--red-dim); }

  /* ===== LOADING STATE ===== */
  #loading-screen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity 0.5s;
  }
  #loading-screen.hide { opacity: 0; pointer-events: none; }
  .load-ring {
    width: 60px; height: 60px; border-radius: 50%;
    border: 3px solid rgba(232,0,42,0.15);
    border-top-color: var(--red);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text {
    font-family: var(--title); font-size: 11px; letter-spacing: 4px; color: var(--red-dim);
    animation: blink 1.5s step-end infinite;
  }

  /* ===== ERROR STATE ===== */
  #error-box {
    display: none;
    text-align: center; padding: 40px;
  }
  #error-box .err-icon { font-size: 48px; margin-bottom: 16px; }
  #error-box .err-title { font-family: var(--title); font-size: 16px; letter-spacing: 3px; color: var(--red); }
  #error-box .err-msg { font-size: 14px; color: var(--text-dim); margin-top: 8px; }

  /* ===== OFFLINE BANNER ===== */
  #offline-banner {
    display: none;
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(139,0,21,0.9); border: 1px solid var(--red);
    border-radius: 8px; padding: 10px 20px;
    font-family: var(--title); font-size: 11px; letter-spacing: 2px;
    z-index: 200; backdrop-filter: blur(10px);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity:0; } }

  /* ===== TIMESTAMP ===== */
  .timestamp-display {
    font-family: var(--mono); font-size: 16px; color: var(--text);
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="load-ring"></div>
  <div class="load-text">LOADING PROFILE...</div>
</div>

<!-- Offline Banner -->
<div id="offline-banner">⚠ CONNECTION LOST — SHOWING CACHED DATA</div>

<!-- Background Canvas -->
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="mouse-glow" id="mouse-glow"></div>

<!-- App -->
<div id="app">
  <div class="card" id="profile-card">
    <div class="card-corner-bl"></div>
    <div class="card-corner-br"></div>

    <!-- Header -->
    <div class="card-header">
      <div class="header-left">
        <div class="red-dot"></div>
        <span class="header-title">PROFILE</span>
      </div>
      <!-- Among Us SVG icon -->
      <svg class="among-icon" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 5C18 5 8 15 8 27v28c0 3 2 5 5 5h6v-8h22v8h6c3 0 5-2 5-5V27C52 15 42 5 30 5z" fill="rgba(232,0,42,0.2)" stroke="rgba(232,0,42,0.5)" stroke-width="1.5"/>
        <rect x="18" y="18" width="24" height="14" rx="7" fill="rgba(100,160,255,0.3)" stroke="rgba(100,160,255,0.5)" stroke-width="1"/>
      </svg>
    </div>

    <!-- Body -->
    <div class="card-body" id="card-body">
      <!-- Error -->
      <div id="error-box" style="grid-column:1/-1">
        <div class="err-icon">🚫</div>
        <div class="err-title">PROFILE NOT FOUND</div>
        <div class="err-msg">No profile data available for this user.</div>
      </div>

      <!-- Avatar -->
      <div class="avatar-section" id="avatar-section" style="display:none">
        <div class="avatar-ring-outer">
          <div class="avatar-glow"></div>
          <!-- Spinning ring SVG -->
          <svg class="avatar-ring-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="92" stroke="rgba(232,0,42,0.6)" stroke-width="2" fill="none"
              stroke-dasharray="12 8" stroke-linecap="round"/>
            <circle cx="100" cy="100" r="85" stroke="rgba(232,0,42,0.2)" stroke-width="1" fill="none"
              stroke-dasharray="4 20" stroke-linecap="round"/>
          </svg>
          <svg class="avatar-ring-svg2" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" stroke="rgba(200,0,0,0.35)" stroke-width="1.5" fill="none"
              stroke-dasharray="3 15" stroke-linecap="round"/>
          </svg>
          <div class="avatar-img-wrap">
            <img class="avatar-img" id="avatar-img" src="" alt="Avatar" onerror="this.style.display='none';document.getElementById('avatar-fb').style.display='flex'">
            <div class="avatar-fallback" id="avatar-fb" style="display:none">👾</div>
          </div>
        </div>
      </div>

      <!-- Info -->
      <div class="info-section" id="info-section" style="display:none">
        <!-- Nickname -->
        <div class="info-box">
          <div class="info-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            NICKNAME
          </div>
          <div class="info-value" id="display-nickname">—</div>
        </div>
        <!-- Friendcode -->
        <div class="info-box">
          <div class="info-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            FRIENDCODE
          </div>
          <div class="friendcode-row">
            <div class="info-value mono" id="display-friendcode">—</div>
            <button class="copy-btn" id="copy-btn" onclick="copyFriendcode()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              COPY
            </button>
          </div>
        </div>
        <!-- Status + Lobby -->
        <div class="status-lobby-row">
          <div class="info-box">
            <div class="info-label" style="color:#ff4466">STATUS</div>
            <div class="status-text" id="display-status">
              <div class="status-dot offline"></div>
              <span>—</span>
            </div>
          </div>
          <div class="info-box">
            <div class="info-label" style="color:#ff4466">LOBBY CODE</div>
            <div class="info-value mono" id="display-lobbycode">—</div>
          </div>
        </div>
        <!-- Playing Since -->
        <div class="info-box">
          <div class="info-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            PLAYING SINCE
          </div>
          <div class="timestamp-display" id="display-playingsince">—</div>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="desc-box" id="desc-box" style="display:none">
      <div class="desc-watermark">⬤</div>
      <div class="desc-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        DESCRIPTION
      </div>
      <div class="desc-text" id="display-description"></div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <div class="dot active"></div>
      <div class="dot inactive"></div>
      <div class="dot inactive"></div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, doc, onSnapshot, enableNetwork, disableNetwork }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  /* ===== FIREBASE CONFIG ===== */
  const firebaseConfig = {
    apiKey: "AIzaSyC0-aU-Tse8Xr3XGqXXGsIHyI4oR7iLwxU",
    authDomain: "mozstudiokey.firebaseapp.com",
    projectId: "mozstudiokey",
    storageBucket: "mozstudiokey.firebasestorage.app",
    messagingSenderId: "216274047995",
    appId: "1:216274047995:web:bd7c0749bbb46d46b2315e",
    measurementId: "G-T47VM18K4W"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* ===== READ UID FROM URL PARAM OR FALLBACK ===== */
  const params = new URLSearchParams(location.search);
  const uid = params.get('uid') || 'demo';

  /* ===== REALTIME LISTENER ===== */
  let profileData = null;
  let typingTimeout = null;

  const unsubscribe = onSnapshot(
    doc(db, 'profiles', uid),
    (snap) => {
      hideLoading();
      if (!snap.exists()) {
        showError();
        return;
      }
      profileData = snap.data();
      renderProfile(profileData);
    },
    (err) => {
      console.error('Firestore error:', err);
      hideLoading();
      if (!profileData) showError();
    }
  );

  /* ===== RENDER ===== */
  function renderProfile(data) {
    document.getElementById('avatar-section').style.display = 'flex';
    document.getElementById('info-section').style.display = 'flex';
    document.getElementById('desc-box').style.display = 'block';
    document.getElementById('error-box').style.display = 'none';

    // Avatar
    const img = document.getElementById('avatar-img');
    const fb  = document.getElementById('avatar-fb');
    if (data.avatarurl) {
      img.src = data.avatarurl;
      img.style.display = 'block';
      fb.style.display = 'none';
    } else {
      img.style.display = 'none';
      fb.style.display = 'flex';
    }

    // Nickname
    document.getElementById('display-nickname').textContent = data.nickname || '—';

    // Friendcode
    document.getElementById('display-friendcode').textContent = data.friendcode || '—';

    // Status
    const statusEl = document.getElementById('display-status');
    const statusVal = data.status || 'Offline';
    const isOnline = statusVal === 'Playing' || statusVal === 'Idle';
    statusEl.innerHTML = `<div class="status-dot ${isOnline ? 'online' : 'offline'}"></div><span>${statusVal}</span>`;
    statusEl.className = `status-text ${isOnline ? 'online' : 'offline'}`;

    // Lobby code
    document.getElementById('display-lobbycode').textContent = data.lobbycode || '—';

    // Playing since — live timer
    renderPlayingSince(data.playingsince);

    // Description — typewriter
    typewriterEffect(data.description || '');
  }

  /* ===== PLAYING SINCE TIMER ===== */
  let timerInterval = null;
  function renderPlayingSince(tsValue) {
    const el = document.getElementById('display-playingsince');
    if (timerInterval) clearInterval(timerInterval);

    if (!tsValue) { el.textContent = 'N/A'; return; }

    // tsValue can be a Firestore Timestamp or ISO string or epoch ms
    let startMs;
    if (tsValue && typeof tsValue.toDate === 'function') {
      startMs = tsValue.toDate().getTime();
    } else if (typeof tsValue === 'number') {
      startMs = tsValue;
    } else {
      startMs = new Date(tsValue).getTime();
    }

    if (isNaN(startMs)) { el.textContent = String(tsValue); return; }

    function update() {
      const diff = Date.now() - startMs;
      if (diff < 0) { el.textContent = 'Just started'; return; }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    update();
    timerInterval = setInterval(update, 1000);
  }

  /* ===== TYPEWRITER ===== */
  let currentTypeText = '';
  let typeIndex = 0;
  let typeTimer = null;
  function typewriterEffect(text) {
    if (text === currentTypeText) return;
    currentTypeText = text;
    typeIndex = 0;
    const el = document.getElementById('display-description');
    if (typeTimer) clearInterval(typeTimer);
    el.innerHTML = '<span class="typing-cursor"></span>';
    typeTimer = setInterval(() => {
      if (typeIndex >= text.length) { clearInterval(typeTimer); return; }
      el.innerHTML = text.slice(0, ++typeIndex) + '<span class="typing-cursor"></span>';
    }, 28);
  }

  /* ===== COPY FRIENDCODE ===== */
  window.copyFriendcode = function() {
    const fc = document.getElementById('display-friendcode').textContent;
    if (fc === '—') return;
    navigator.clipboard.writeText(fc).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.classList.add('copied');
      btn.innerHTML = '✓ COPIED';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> COPY`;
      }, 2000);
    });
  };

  /* ===== UI HELPERS ===== */
  function hideLoading() {
    const s = document.getElementById('loading-screen');
    s.classList.add('hide');
    setTimeout(() => s.style.display = 'none', 500);
  }
  function showError() {
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('avatar-section').style.display = 'none';
    document.getElementById('info-section').style.display = 'none';
    document.getElementById('desc-box').style.display = 'none';
  }

  /* ===== OFFLINE DETECTION ===== */
  window.addEventListener('offline', () => {
    document.getElementById('offline-banner').style.display = 'block';
  });
  window.addEventListener('online', () => {
    document.getElementById('offline-banner').style.display = 'none';
    enableNetwork(db);
  });
</script>

<!-- Canvas Particles + Mouse Glow -->
<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Stars
  for (let i = 0; i < 160; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.5 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.0003 + 0.0001,
      twinkle: Math.random() * Math.PI * 2
    });
  }

  // Floating particles
  for (let i = 0; i < 35; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2 + 0.5,
      a: Math.random() * 0.5 + 0.1,
      color: Math.random() > 0.6 ? '#e8002a' : '#1a3060'
    });
  }

  let t = 0;
  function draw() {
    t += 0.016;
    ctx.clearRect(0, 0, W, H);

    // Deep space gradient
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
    grad.addColorStop(0, '#061225');
    grad.addColorStop(0.5, '#030d1a');
    grad.addColorStop(1, '#020810');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ambient red glow bottom
    const glow = ctx.createRadialGradient(W/2, H, 0, W/2, H, W*0.6);
    glow.addColorStop(0, 'rgba(232,0,42,0.06)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // Stars
    stars.forEach(s => {
      s.twinkle += s.speed * 60;
      const alpha = s.a * (0.5 + 0.5 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    });

    // Particles
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.floor(p.a * 255).toString(16).padStart(2,'0');
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();

  // Mouse glow
  const glowEl = document.getElementById('mouse-glow');
  document.addEventListener('mousemove', e => {
    glowEl.style.left = e.clientX + 'px';
    glowEl.style.top  = e.clientY + 'px';
  });
})();
</script>
