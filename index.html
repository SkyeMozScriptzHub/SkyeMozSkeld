<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SkyeMoz Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#040712;
--card:rgba(10,15,30,0.65);
--line:rgba(255,255,255,0.08);
--red:#ff3b3b;
--red2:#ff6565;
--text:#ffffff;
--muted:#a0a7c0;
--green:#42ff78;
--blur:18px;
}

html,body{
height:100%;
font-family:'Rajdhani',sans-serif;
background:black;
overflow-x:hidden;
color:white;
}

body{
background:
radial-gradient(circle at top left,#250000 0%,transparent 30%),
radial-gradient(circle at bottom right,#001733 0%,transparent 30%),
linear-gradient(180deg,#02030a,#040814,#03040b);
}

canvas{
position:fixed;
inset:0;
z-index:-2;
}

.stars{
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.08;
animation:starsMove 120s linear infinite;
z-index:-1;
}

@keyframes starsMove{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.scanline{
position:fixed;
inset:0;
pointer-events:none;
background:
linear-gradient(
to bottom,
transparent,
rgba(255,255,255,0.015),
transparent
);
background-size:100% 6px;
mix-blend-mode:overlay;
opacity:.5;
z-index:20;
}

.mouse-glow{
position:fixed;
width:350px;
height:350px;
border-radius:50%;
background:radial-gradient(circle,rgba(255,0,0,.18),transparent 70%);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:0;
}

.wrapper{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
position:relative;
z-index:2;
}

.card{
width:100%;
max-width:1180px;
background:var(--card);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(var(--blur));
border-radius:34px;
padding:28px;
position:relative;
overflow:hidden;
box-shadow:
0 0 40px rgba(255,0,0,.08),
0 0 100px rgba(0,140,255,.06),
inset 0 0 30px rgba(255,255,255,.03);
animation:cardBreath 5s infinite ease-in-out;
}

@keyframes cardBreath{
0%,100%{
box-shadow:
0 0 40px rgba(255,0,0,.08),
0 0 100px rgba(0,140,255,.06),
inset 0 0 30px rgba(255,255,255,.03);
}
50%{
box-shadow:
0 0 60px rgba(255,0,0,.18),
0 0 120px rgba(0,140,255,.1),
inset 0 0 40px rgba(255,255,255,.05);
}
}

.card::before{
content:'';
position:absolute;
inset:0;
border-radius:34px;
padding:1px;
background:linear-gradient(
135deg,
rgba(255,255,255,.3),
rgba(255,0,0,.4),
transparent,
rgba(0,153,255,.2)
);
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
pointer-events:none;
}

.top{
display:flex;
align-items:center;
gap:12px;
margin-bottom:25px;
font-family:'Orbitron',sans-serif;
font-size:36px;
font-weight:800;
letter-spacing:2px;
}

.dot{
width:18px;
height:18px;
border-radius:50%;
background:var(--red);
box-shadow:
0 0 20px var(--red),
0 0 50px var(--red);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

.main{
display:grid;
grid-template-columns:420px 1fr;
gap:28px;
}

.avatar-panel{
background:rgba(0,0,0,.25);
border:1px solid var(--line);
border-radius:28px;
padding:24px;
position:relative;
overflow:hidden;
}

.avatar-wrap{
width:100%;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.ring{
position:absolute;
width:82%;
height:82%;
border-radius:50%;
border:3px solid rgba(255,0,0,.5);
box-shadow:
0 0 30px rgba(255,0,0,.5),
inset 0 0 20px rgba(255,0,0,.2);
animation:ringSpin 12s linear infinite;
}

.ring::before{
content:'';
position:absolute;
inset:-15px;
border-radius:50%;
border:2px dashed rgba(255,80,80,.4);
}

@keyframes ringSpin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.avatar{
width:72%;
height:72%;
border-radius:50%;
object-fit:cover;
position:relative;
z-index:2;
filter:drop-shadow(0 0 20px rgba(255,0,0,.5));
}

.info{
display:flex;
flex-direction:column;
gap:18px;
}

.box{
background:rgba(0,0,0,.25);
border:1px solid var(--line);
border-radius:22px;
padding:18px;
position:relative;
overflow:hidden;
transition:.35s;
}

.box:hover{
transform:translateY(-2px);
border-color:rgba(255,0,0,.4);
box-shadow:0 0 25px rgba(255,0,0,.15);
}

.label{
font-family:'Orbitron',sans-serif;
font-size:13px;
letter-spacing:1px;
color:#ff5d5d;
margin-bottom:10px;
}

.nickname{
font-size:56px;
font-weight:700;
line-height:1;
word-break:break-word;
}

.friend-flex{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.friendcode{
font-size:34px;
font-weight:600;
}

.copy-btn{
border:none;
background:linear-gradient(135deg,#ff3737,#9f0000);
padding:14px 24px;
border-radius:14px;
color:white;
font-family:'Orbitron',sans-serif;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(255,0,0,.25);
}

.copy-btn:hover{
transform:translateY(-2px) scale(1.03);
box-shadow:0 0 30px rgba(255,0,0,.45);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.status{
display:flex;
align-items:center;
gap:10px;
font-size:28px;
font-weight:700;
}

.status-indicator{
width:18px;
height:18px;
border-radius:50%;
background:var(--green);
box-shadow:0 0 20px var(--green);
animation:pulse 2s infinite;
}

.desc{
font-size:34px;
line-height:1.45;
white-space:pre-wrap;
min-height:170px;
}

.bottom{
margin-top:22px;
display:flex;
justify-content:center;
gap:12px;
}

.carousel-dot{
width:12px;
height:12px;
border-radius:50%;
background:#444;
}

.carousel-dot.active{
background:var(--red);
box-shadow:0 0 15px var(--red);
}

.loading{
display:flex;
align-items:center;
justify-content:center;
height:400px;
font-size:28px;
font-family:'Orbitron',sans-serif;
gap:18px;
}

.spinner{
width:42px;
height:42px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid var(--red);
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.toast{
position:fixed;
top:25px;
right:25px;
padding:16px 22px;
border-radius:16px;
background:rgba(10,15,30,.85);
backdrop-filter:blur(14px);
border:1px solid rgba(255,0,0,.35);
font-weight:600;
z-index:999;
opacity:0;
transform:translateY(-20px);
transition:.4s;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#ff2d2d;
border-radius:20px;
}

@media(max-width:980px){

.main{
grid-template-columns:1fr;
}

.nickname{
font-size:42px;
}

.friendcode{
font-size:26px;
}

.desc{
font-size:24px;
}

}

@media(max-width:600px){

.wrapper{
padding:15px;
}

.card{
padding:18px;
border-radius:26px;
}

.top{
font-size:24px;
}

.nickname{
font-size:32px;
}

.friendcode{
font-size:20px;
}

.status{
font-size:22px;
}

.desc{
font-size:18px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="stars"></div>
<div class="scanline"></div>
<div class="mouse-glow" id="glow"></div>

<div class="wrapper">

<div class="card">

<div class="top">
<div class="dot"></div>
<div>PROFILE</div>
</div>

<div id="loading" class="loading">
<div class="spinner"></div>
Loading Profile...
</div>

<div id="profileUI" style="display:none;">

<div class="main">

<div class="avatar-panel">

<div class="avatar-wrap">
<div class="ring"></div>

<img
id="avatar"
class="avatar"
src="https://i.imgur.com/4Z7Dz0o.png"
/>

</div>

</div>

<div class="info">

<div class="box">
<div class="label">NICKNAME</div>
<div id="nickname" class="nickname">Loading...</div>
</div>

<div class="box">

<div class="label">FRIENDCODE</div>

<div class="friend-flex">

<div id="friendcode" class="friendcode">Loading...</div>

<button class="copy-btn" id="copyBtn">
COPY
</button>

</div>

</div>

<div class="grid">

<div class="box">

<div class="label">STATUS</div>

<div class="status">
<div class="status-indicator" id="statusDot"></div>
<div id="statusText">Offline</div>
</div>

</div>

<div class="box">

<div class="label">LOBBY CODE</div>

<div class="status">
<div id="lobbycode">N/A</div>
</div>

</div>

</div>

<div class="box">

<div class="label">PLAYING SINCE</div>

<div class="status">
<div id="playingsince">N/A</div>
</div>

</div>

</div>

</div>

<div class="box" style="margin-top:22px;">

<div class="label">DESCRIPTION</div>

<div id="description" class="desc"></div>

</div>

<div class="bottom">
<div class="carousel-dot"></div>
<div class="carousel-dot active"></div>
<div class="carousel-dot"></div>
</div>

</div>

</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC0-aU-Tse8Xr3XGqXXGsIHyI4oR7iLwxU",
authDomain: "mozstudiokey.firebaseapp.com",
projectId: "mozstudiokey",
storageBucket: "mozstudiokey.firebasestorage.app",
messagingSenderId: "216274047995",
appId: "1:216274047995:web:bd7c0749bbb46d46b2315e",
measurementId: "G-T47VM18K4W"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USER_ID = new URLSearchParams(location.search).get("uid")
|| "demo";

const loading = document.getElementById("loading");
const profileUI = document.getElementById("profileUI");

const nickname = document.getElementById("nickname");
const friendcode = document.getElementById("friendcode");
const statusText = document.getElementById("statusText");
const statusDot = document.getElementById("statusDot");
const lobbycode = document.getElementById("lobbycode");
const playingsince = document.getElementById("playingsince");
const description = document.getElementById("description");
const avatar = document.getElementById("avatar");

function toast(text){
const t = document.getElementById("toast");
t.innerText = text;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2500);
}

function relativeTime(timestamp){

if(!timestamp) return "N/A";

const now = Date.now();
const diff = now - timestamp;

const sec = Math.floor(diff / 1000);
const min = Math.floor(sec / 60);
const hr = Math.floor(min / 60);

if(sec < 60) return `${sec}s ago`;
if(min < 60) return `${min}m ago`;
if(hr < 24) return `${hr}h ago`;

const day = Math.floor(hr / 24);
return `${day}d ago`;

}

function typeWriter(text){

description.innerHTML = "";
let i = 0;

const interval = setInterval(()=>{

description.innerHTML += text.charAt(i);

i++;

if(i >= text.length){
clearInterval(interval);
}

},18);

}

function applyStatus(status){

statusText.innerText = status || "Offline";

if(status.includes("Playing") || status.includes("Idle")){
statusDot.style.background = "#42ff78";
statusDot.style.boxShadow = "0 0 20px #42ff78";
}else{
statusDot.style.background = "#ff3030";
statusDot.style.boxShadow = "0 0 20px #ff3030";
}

}

const profileRef = doc(db,"profiles",USER_ID);

onSnapshot(profileRef,(snap)=>{

loading.style.display = "none";
profileUI.style.display = "block";

if(!snap.exists()){

nickname.innerText = "Profile Not Found";
friendcode.innerText = "N/A";

toast("Profile Not Found");

return;
}

const data = snap.data();

nickname.innerText = data.nickname || "Unknown";
friendcode.innerText = data.friendcode || "N/A";

applyStatus(data.status || "🔴 Offline");

lobbycode.innerText = data.lobbycode || "N/A";

playingsince.innerText =
relativeTime(data.playingsince);

typeWriter(data.description || "No description.");

avatar.src =
data.avatarurl ||
"https://i.imgur.com/4Z7Dz0o.png";

toast("Profile Updated Live");

},()=>{

loading.innerHTML =
`<div>Connection Lost</div>`;

});

document.getElementById("copyBtn")
.onclick = ()=>{

navigator.clipboard.writeText(
friendcode.innerText
);

toast("Friendcode Copied");

};

const glow = document.getElementById("glow");

window.addEventListener("mousemove",(e)=>{

glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";

});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const particles = [];

for(let i=0;i<120;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
s:Math.random()*0.6+0.2
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.y += p.s;

if(p.y > canvas.height){
p.y = 0;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle = "rgba(255,255,255,.7)";
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize",()=>{

canvas.width = innerWidth;
canvas.height = innerHeight;

});

</script>

</body>
</html>
